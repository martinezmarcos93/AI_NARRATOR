  npc_agrupador: "ancestro"
  mecanica_moral: "Alineamiento"
  mecanica_central: "Clases, Hazañas y Hechizos"
  eje_horror: "corrupción, ambición y el precio del poder"
  ritual_union: "Pacto de Compañía"
  corte_term: "Concejo de la Ciudad"

