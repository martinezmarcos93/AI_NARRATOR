# ============================================================
# Sistema: Dungeons & Dragons — 5ª Edición
# ============================================================

sistema: "Dungeons & Dragons"
edition: "5e"
slug: "dnd_5e"

# --- Vocabulario ---
vocabulario:
  grupo_pc: "grupo de aventureros"
  faccion_term: "faccion"
  lider_term: "Líder de Facción"
  asistente_lider_term: "Lugarteniente"
  territorio_term: "feudo"
  personaje_term: "aventurero"
  npc_agrupador: "raza"
  mecanica_moral: "Alineamiento"
  mecanica_central: "Clases y Habilidades"
  eje_horror: "corrupción, maldición y poder corruptor"
  ritual_union: "Juramento de Compañía"
  corte_term: "Salón del Consejo"

# --- Campos custom NPC ---
npc_campos_extra:
  - nombre: "raza"
    label: "Raza"
    tipo: "string"
  - nombre: "clase"
    label: "Clase / Oficio"
    tipo: "string"
  - nombre: "nivel_poder"
    label: "Nivel de Poder"
    tipo: "integer"
  - nombre: "alineamiento"
    label: "Alineamiento"
    tipo: "string"
  - nombre: "faccion"
    label: "Facción"
    tipo: "wikilink"

# --- Campos custom Facción ---
faccion_campos_extra:
  - nombre: "lider"
    label: "Líder"
    tipo: "wikilink"
  - nombre: "base_operaciones"
    label: "Base de Operaciones"
    tipo: "wikilink"
  - nombre: "simbolo"
    label: "Símbolo"
    tipo: "string"

# --- Pool de acciones de NPCs (para simulación entre sesiones) ---
npc_acciones:
  - "patrullar su feudo"
  - "reclutar mercenarios"
  - "reunirse con su facción"
  - "recolectar información sobre los PJs"
  - "avanzar su objetivo principal"
  - "eliminar un obstáculo menor"
  - "establecer una alianza nueva"
  - "preparar una trampa o emboscada"
  - "negociar con un rival"
  - "lanzar un hechizo ritual"
  - "saquear o robar recursos"
  - "corromper a un oficial"

# --- Amenazas externas típicas ---
amenazas_externas:
  - "Cultos demoníacos"
  - "Imperio expansionista"
  - "Ejército de No-Muertos"
  - "Dragón en la región"
  - "Plaga mágica"
  - "Invasión del Plano de Sombras"

# --- Prompt de sistema LLM ---
llm_system_prompt: |
  Eres un Dungeon Master de Dungeons & Dragons 5ª Edición.
  Tu tono es épico, con elementos de fantasía oscura y aventura.
  Reglas estrictas:
  - No inventés razas, hechizos ni facciones que no estén en el contexto.
  - No contradecís la información del vault que se te proporciona.
  - Respondé en español rioplatense.
  - Limitá la respuesta a 2-3 párrafos narrativos (máximo 250 palabras).
  - Si se te pide un menú de opciones, ofrecé exactamente 3, sin respuesta correcta.

# --- Tags Dataview ---
tags_por_tipo:
  npc: ["npc", "personaje"]
  locacion: ["locacion"]
  frente: ["frente", "amenaza"]
  misterio: ["misterio"]
  faccion: ["faccion", "gremio"]

# --- Planilla de personaje (schema dinámico para GUI) ---
character_sheet_schema:
  archetype_key: clase
  base_sections:
    - name: "Identidad"
      fields:
        - {key: nombre,           label: Nombre,             type: string}
        - {key: raza,             label: Raza,               type: string}
        - {key: clase,            label: Clase,              type: string}
        - {key: nivel,            label: Nivel,              type: int}
        - {key: trasfondo,        label: Trasfondo,          type: string}
        - {key: alineamiento,     label: Alineamiento,       type: string}
    - name: "Atributos"
      display: stat_block
      fields:
        - {key: fuerza,           label: FUE,                type: int, min: 1, max: 20}
        - {key: destreza,         label: DES,                type: int, min: 1, max: 20}
        - {key: constitucion,     label: CON,                type: int, min: 1, max: 20}
        - {key: inteligencia,     label: INT,                type: int, min: 1, max: 20}
        - {key: sabiduria,        label: SAB,                type: int, min: 1, max: 20}
        - {key: carisma,          label: CAR,                type: int, min: 1, max: 20}
    - name: "Combate"
      fields:
        - {key: hp,               label: PG actuales,        type: int}
        - {key: hp_max,           label: PG máximos,         type: int}
        - {key: ca,               label: CA,                 type: int}
        - {key: velocidad,        label: Velocidad,          type: string}
        - {key: dado_golpe,       label: Dado de Golpe,      type: string}
  conditional_sections:
    mago:
      - name: "Arcana"
        fields:
          - {key: escuela_magia,  label: Escuela de Magia,   type: string}
          - {key: espacios_hechizo, label: Espacios/día,     type: string}
          - {key: hechizos,       label: Hechizos,           type: list}
    guerrero:
      - name: "Capacidades"
        fields:
          - {key: estilo_combate, label: Estilo de Combate,  type: string}
          - {key: surge_accion,   label: Surge de Acción,    type: string}
          - {key: segundo_aliento,label: Segundo Aliento,    type: string}
    clerigo:
      - name: "Divinidad"
        fields:
          - {key: deidad,         label: Deidad,             type: string}
          - {key: dominio,        label: Dominio Divino,     type: string}
          - {key: espacios_hechizo, label: Espacios/día,     type: string}
    picaro:
      - name: "Astucia"
        fields:
          - {key: ataque_furtivo, label: Ataque Furtivo,     type: string}
          - {key: arquetipo,      label: Arquetipo Pícaro,   type: string}
    barbaro:
      - name: "Furia"
        fields:
          - {key: furias_dia,     label: Furias por día,     type: int}
          - {key: sendero_totem,  label: Sendero Primario,   type: string}
    paladin:
      - name: "Sagrado"
        fields:
          - {key: deidad,         label: Deidad,             type: string}
          - {key: juramento,      label: Juramento,          type: string}
          - {key: imposicion_manos, label: Imposición de Manos, type: string}
    brujo:
      - name: "Patrono"
        fields:
          - {key: patron,         label: Patrón Infernal,    type: string}
          - {key: invocaciones,   label: Invocaciones,       type: list}
          - {key: espacios_hechizo, label: Espacios (regen), type: string}
